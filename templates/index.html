<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ r.name }} · Kol</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --kol:        #1A1A2E;
      --kol-accent: #C9A84C;
      --bg:         #080D18;
      --surface:    #FFFFFF;
      --text:       #1A1A1A;
      --muted:      #8B9CB6;
      --border:     #E8E4DC;
      --brand:      {{ r.color }};
      --brand-light: color-mix(in srgb, {{ r.color }} 10%, white);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100%;
      font-family: 'Inter', 'Segoe UI', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    /* Star canvas fixed behind everything */
    #stars {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    /* Page layout */
    .page {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 28px 16px 0;
      min-height: 100vh;
    }

    /* ── Kol top bar ────────────────────────── */
    .kol-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      max-width: 480px;
      margin-bottom: 18px;
    }

    .kol-wordmark {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .kol-icon {
      width: 30px;
      height: 30px;
      background: white;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .kol-icon svg { width: 16px; height: 16px; fill: var(--kol); }

    .kol-name {
      font-size: 1.1rem;
      font-weight: 600;
      color: white;
      letter-spacing: -0.02em;
    }

    .kol-name span { color: var(--kol-accent); }

    /* Sound wave */
    .wave-deco {
      display: flex;
      align-items: center;
      gap: 3px;
      height: 20px;
    }

    .wave-deco span {
      display: block;
      width: 3px;
      border-radius: 3px;
      background: var(--kol-accent);
      animation: wavebar 1.3s ease-in-out infinite;
    }

    .wave-deco span:nth-child(1) { height: 4px;  animation-delay: 0s; }
    .wave-deco span:nth-child(2) { height: 11px; animation-delay: 0.1s; }
    .wave-deco span:nth-child(3) { height: 18px; animation-delay: 0.2s; }
    .wave-deco span:nth-child(4) { height: 11px; animation-delay: 0.3s; }
    .wave-deco span:nth-child(5) { height: 5px;  animation-delay: 0.4s; }
    .wave-deco span:nth-child(6) { height: 13px; animation-delay: 0.15s; }
    .wave-deco span:nth-child(7) { height: 7px;  animation-delay: 0.25s; }

    @keyframes wavebar {
      0%, 100% { transform: scaleY(1);   opacity: 0.5; }
      50%       { transform: scaleY(1.7); opacity: 1; }
    }

    /* ── Hero ───────────────────────────────── */
    .hero {
      text-align: center;
      margin-bottom: 18px;
      width: 100%;
      max-width: 480px;
    }

    .hero h2 {
      font-size: 1.4rem;
      font-weight: 600;
      color: white;
      letter-spacing: -0.03em;
    }

    .hero p {
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 5px;
      direction: ltr;
    }

    /* ── Chat card ──────────────────────────── */
    .card {
      width: 100%;
      max-width: 480px;
      height: min(620px, calc(100vh - 200px));
      background: rgba(18, 26, 44, 0.62);
      backdrop-filter: blur(22px) saturate(1.4);
      -webkit-backdrop-filter: blur(22px) saturate(1.4);
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow:
        0 0 0 1px color-mix(in srgb, var(--brand) 20%, transparent),
        0 4px 16px rgba(0,0,0,0.4),
        0 24px 60px rgba(0,0,0,0.55);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .rest-header {
      background: linear-gradient(135deg,
        color-mix(in srgb, var(--brand) 85%, black) 0%,
        var(--brand) 100%);
      color: white;
      padding: 16px 20px;
      flex-shrink: 0;
      border-bottom: 1px solid color-mix(in srgb, var(--brand) 40%, transparent);
    }

    .rest-header-top {
      display: flex;
      align-items: center;
      gap: 9px;
    }

    .online-dot {
      width: 8px;
      height: 8px;
      background: #7BE495;
      border-radius: 50%;
      flex-shrink: 0;
      box-shadow: 0 0 0 2px rgba(123,228,149,0.3);
    }

    .rest-name { font-size: 1rem; font-weight: 600; }
    .rest-tagline { font-size: 0.74rem; opacity: 0.8; margin-top: 3px; padding-right: 17px; }

    {% if r.badge %}
    .rest-badge {
      display: inline-block;
      margin-top: 8px;
      margin-right: 17px;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.3);
      font-size: 0.7rem;
      padding: 2px 9px;
      border-radius: 20px;
    }
    {% endif %}

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      scroll-behavior: smooth;
    }

    #messages::-webkit-scrollbar { width: 3px; }
    #messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }

    .msg {
      max-width: 78%;
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 0.875rem;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
      animation: fadeUp 0.18s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg.bot  { background: color-mix(in srgb, var(--brand) 22%, rgba(255,255,255,0.06)); color: #F4F6F8; align-self: flex-end; border-bottom-right-radius: 4px; border: 1px solid color-mix(in srgb, var(--brand) 45%, transparent); }
    .msg.user { background: rgba(255,255,255,0.08); color: #F4F6F8; align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid rgba(255,255,255,0.1); }
    .msg.system { background: rgba(201,168,76,0.15); color: var(--kol-accent); align-self: center; font-size: 0.78rem; text-align: center; border-radius: 10px; max-width: 90%; padding: 7px 14px; border: 1px solid rgba(201,168,76,0.25); }

    #chips { display: flex; flex-wrap: wrap; gap: 7px; align-self: flex-end; max-width: 95%; animation: fadeUp 0.2s ease 0.1s both; }

    .chip {
      background: rgba(255,255,255,0.04);
      border: 1.5px solid color-mix(in srgb, var(--brand) 55%, transparent);
      color: color-mix(in srgb, var(--brand) 40%, white);
      border-radius: 20px;
      padding: 5px 13px;
      font-size: 0.78rem;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
    }

    .chip:hover { background: var(--brand); color: white; border-color: var(--brand); transform: translateY(-1px); }

    .typing {
      display: flex;
      gap: 4px;
      align-items: center;
      padding: 10px 14px;
      background: color-mix(in srgb, var(--brand) 22%, rgba(255,255,255,0.06));
      border: 1px solid color-mix(in srgb, var(--brand) 45%, transparent);
      border-radius: 16px;
      border-bottom-right-radius: 4px;
      align-self: flex-end;
      width: fit-content;
    }

    .typing span { width: 6px; height: 6px; background: color-mix(in srgb, var(--brand) 40%, white); border-radius: 50%; opacity: 0.6; animation: bounce 1.2s infinite; }
    .typing span:nth-child(2) { animation-delay: 0.15s; }
    .typing span:nth-child(3) { animation-delay: 0.3s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
      30% { transform: translateY(-5px); opacity: 1; }
    }

    .input-area {
      padding: 10px 12px;
      border-top: 1px solid rgba(255,255,255,0.08);
      display: flex;
      gap: 8px;
      align-items: flex-end;
      flex-shrink: 0;
      background: rgba(8, 13, 24, 0.35);
    }

    #user-input {
      flex: 1;
      border: 1.5px solid rgba(255,255,255,0.1);
      border-radius: 22px;
      padding: 9px 16px;
      font-size: 0.875rem;
      outline: none;
      resize: none;
      line-height: 1.4;
      max-height: 90px;
      font-family: inherit;
      background: rgba(255,255,255,0.04);
      color: #F4F6F8;
      transition: border-color 0.15s, background 0.15s;
      direction: rtl;
    }

    #user-input:focus { border-color: var(--brand); background: rgba(255,255,255,0.07); }
    #user-input::placeholder { color: rgba(255,255,255,0.35); }

    #send-btn {
      width: 38px; height: 38px; border-radius: 50%;
      background: var(--brand); border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: all 0.15s;
    }

    #send-btn:hover:not(:disabled) { filter: brightness(0.88); transform: scale(1.06); }
    #send-btn:disabled { background: rgba(255,255,255,0.15); cursor: default; }
    #send-btn svg { width: 17px; height: 17px; fill: white; }

    /* ── Feature pills ───────────────────────── */
    .features {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-top: 14px;
      flex-wrap: wrap;
      width: 100%;
      max-width: 480px;
    }

    .pill {
      display: flex;
      align-items: center;
      gap: 5px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px;
      padding: 5px 13px;
      font-size: 0.75rem;
      color: rgba(255,255,255,0.75);
    }

    /* ── Footer ─────────────────────────────── */
    .kol-footer {
      margin-top: 12px;
      font-size: 0.72rem;
      color: rgba(255,255,255,0.3);
      display: flex;
      align-items: center;
      gap: 5px;
      direction: ltr;
      margin-bottom: 12px;
    }

    .kol-footer strong { color: rgba(255,255,255,0.6); font-weight: 600; }
    .kol-footer .sep { color: var(--kol-accent); }

    /* ── Ocean scene ─────────────────────────── */
    .ocean-wrap {
      width: 100%;
      align-self: stretch;
      margin-top: auto;
      padding-top: 16px;
      pointer-events: none;
      overflow: hidden;
    }

    .ocean-scene {
      width: 100%;
      height: auto;
      display: block;
    }

    .boat-group {
      animation: bob 4s ease-in-out infinite;
      transform-origin: 300px 108px;
    }


    @keyframes bob {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-5px); }
    }

    /* ── Mobile ─────────────────────────────── */
    @media (max-width: 520px) {
      .page { padding: 0; }
      .kol-bar, .hero, .features, .kol-footer, .ocean-wrap { display: none; }
      .card { max-width: 100%; height: 100vh; border-radius: 0; box-shadow: none; }
    }

  </style>
</head>
<body>

<canvas id="stars"></canvas>

<div class="page">

  <div class="kol-bar">
    <div class="kol-wordmark">
      <div class="kol-icon">
        <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
      </div>
      <span class="kol-name">kol<span>.</span></span>
    </div>
    <div class="wave-deco">
      <span></span><span></span><span></span><span></span><span></span><span></span><span></span>
    </div>
  </div>

  <div class="hero">
    <h2>הבוט שתמיד עונה</h2>
    <p>24/7 customer service for your restaurant — in any language</p>
  </div>

  <div class="card">
    <div class="rest-header">
      <div class="rest-header-top">
        <div class="online-dot"></div>
        <div class="rest-name">{{ r.name }}</div>
      </div>
      <div class="rest-tagline">{{ r.tagline }}</div>
      {% if r.badge %}<span class="rest-badge">{{ r.badge }}</span>{% endif %}
    </div>
    <div id="messages"></div>
    <div class="input-area">
      <textarea id="user-input" placeholder="שאל/י אותנו משהו..." rows="1"></textarea>
      <button id="send-btn" aria-label="שלח">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>

  <div class="features">
    <div class="pill">🌐 12 שפות</div>
    <div class="pill">⚡ עונה תוך שניות</div>
    <div class="pill">🕐 זמין 24/7</div>
  </div>

  <div class="kol-footer">
    <strong>kol.</strong><span class="sep">·</span><span>שירות לקוחות חכם לעסקים</span>
  </div>

  <div class="ocean-wrap">
  <!-- Ocean illustration -->
  <svg class="ocean-scene" viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="seaGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#0E2A50"/>
        <stop offset="100%" stop-color="#06101E"/>
      </linearGradient>
      <linearGradient id="woodGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#9B6B3A"/>
        <stop offset="100%" stop-color="#5C3A1E"/>
      </linearGradient>
      <radialGradient id="eyeGlow" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#00D4FF" stop-opacity="1"/>
        <stop offset="100%" stop-color="#00D4FF" stop-opacity="0"/>
      </radialGradient>
    </defs>

    <!-- Sea fill -->
    <rect x="0" y="108" width="900" height="92" fill="url(#seaGrad)"/>

    <!-- Back wave — period 300px, path spans -1200 → 2100 (far past viewport 0–900) -->
    <path fill="#0E3A6A" opacity="0.95"
      d="M -1200 118 Q -1125 105 -1050 118 Q -975 131 -900 118 Q -825 105 -750 118 Q -675 131 -600 118 Q -525 105 -450 118 Q -375 131 -300 118 Q -225 105 -150 118 Q -75 131 0 118 Q 75 105 150 118 Q 225 131 300 118 Q 375 105 450 118 Q 525 131 600 118 Q 675 105 750 118 Q 825 131 900 118 Q 975 105 1050 118 Q 1125 131 1200 118 Q 1275 105 1350 118 Q 1425 131 1500 118 Q 1575 105 1650 118 Q 1725 131 1800 118 Q 1875 105 1950 118 Q 2025 131 2100 118 L 2100 200 L -1200 200 Z">
      <animateTransform attributeName="transform" type="translate"
        values="0 0; 300 0" keyTimes="0;1" dur="10s" repeatCount="indefinite"/>
    </path>

    <!-- Front wave — phase-offset, faster -->
    <path fill="#164878"
      d="M -1200 123 Q -1125 137 -1050 123 Q -975 109 -900 123 Q -825 137 -750 123 Q -675 109 -600 123 Q -525 137 -450 123 Q -375 109 -300 123 Q -225 137 -150 123 Q -75 109 0 123 Q 75 137 150 123 Q 225 109 300 123 Q 375 137 450 123 Q 525 109 600 123 Q 675 137 750 123 Q 825 109 900 123 Q 975 137 1050 123 Q 1125 109 1200 123 Q 1275 137 1350 123 Q 1425 109 1500 123 Q 1575 137 1650 123 Q 1725 109 1800 123 Q 1875 137 1950 123 Q 2025 109 2100 123 L 2100 200 L -1200 200 Z">
      <animateTransform attributeName="transform" type="translate"
        values="0 0; 300 0" keyTimes="0;1" dur="7s" repeatCount="indefinite"/>
    </path>

    <!-- Wave crest highlight (top edge of front wave, no fill, just a bright stroke) -->
    <path fill="none" stroke="rgba(100,180,255,0.25)" stroke-width="1.5"
      d="M -1200 123 Q -1125 137 -1050 123 Q -975 109 -900 123 Q -825 137 -750 123 Q -675 109 -600 123 Q -525 137 -450 123 Q -375 109 -300 123 Q -225 137 -150 123 Q -75 109 0 123 Q 75 137 150 123 Q 225 109 300 123 Q 375 137 450 123 Q 525 109 600 123 Q 675 137 750 123 Q 825 109 900 123 Q 975 137 1050 123 Q 1125 109 1200 123 Q 1275 137 1350 123 Q 1425 109 1500 123 Q 1575 137 1650 123 Q 1725 109 1800 123 Q 1875 137 1950 123 Q 2025 109 2100 123">
      <animateTransform attributeName="transform" type="translate"
        values="0 0; 300 0" keyTimes="0;1" dur="7s" repeatCount="indefinite"/>
    </path>

    <!-- BOAT GROUP (bobs) -->
    <g class="boat-group">

      <!-- Hull -->
      <path fill="url(#woodGrad)"
        d="M 230 108 L 370 108 L 358 128 Q 300 138 242 128 Z"/>

      <!-- Hull stripe -->
      <path fill="#7A4E28" opacity="0.5"
        d="M 230 108 L 370 108 L 370 113 L 230 113 Z"/>

      <!-- Deck cabin -->
      <rect fill="#3D2510" x="268" y="83" width="68" height="26" rx="4"/>
      <rect fill="#4A2E14" x="271" y="85" width="62" height="22" rx="3"/>

      <!-- Cabin windows (3) -->
      <rect fill="#061020" x="275" y="88" width="12" height="9" rx="2"/>
      <rect fill="#061020" x="292" y="88" width="12" height="9" rx="2"/>
      <rect fill="#061020" x="309" y="88" width="12" height="9" rx="2"/>
      <!-- Window warm glow -->
      <rect fill="#C9A84C" x="275" y="88" width="12" height="9" rx="2" opacity="0.25"/>
      <rect fill="#C9A84C" x="292" y="88" width="12" height="9" rx="2" opacity="0.25"/>

      <!-- Hull text "ניסו הדייג" -->
      <text x="300" y="123" text-anchor="middle"
        fill="#C9A84C" font-size="9" font-family="Arial" font-weight="bold" opacity="0.85"
        direction="rtl">ניסו הדייג</text>

      <!-- Mast -->
      <rect fill="#2E1A08" x="291" y="20" width="5" height="65" rx="2"/>

      <!-- Sail -->
      <path fill="#F0EDE8" opacity="0.93"
        d="M 296 24 L 296 82 L 346 64 Z"/>
      <!-- Sail shading -->
      <path fill="#D8D4CE" opacity="0.3"
        d="M 296 50 L 296 82 L 346 64 Z"/>
      <!-- "kol." on sail -->
      <text x="322" y="58" text-anchor="middle"
        fill="#1A1A2E" font-size="11" font-family="Arial" font-weight="bold"
        transform="rotate(-18, 322, 58)">kol.</text>

      <!-- Gold flag -->
      <path fill="#C9A84C" d="M 296 20 L 316 26 L 296 32 Z"/>

      <!-- ROBOT -->
      <!-- Body -->
      <rect fill="#1E3A58" x="350" y="72" width="26" height="36" rx="5"/>
      <!-- Chest panel -->
      <rect fill="#0B1A2E" x="353" y="76" width="20" height="11" rx="2"/>
      <!-- Chest light -->
      <circle fill="#00D4FF" cx="358" cy="82" r="2.5" opacity="0.8"/>
      <circle fill="#C9A84C" cx="366" cy="82" r="2.5" opacity="0.8"/>

      <!-- Head -->
      <rect fill="#1E3A58" x="352" y="53" width="22" height="20" rx="5"/>
      <!-- Visor -->
      <rect fill="#0B1A2E" x="354" y="56" width="18" height="13" rx="3"/>
      <!-- Eyes -->
      <circle fill="#00D4FF" cx="359" cy="63" r="3.5"/>
      <circle fill="#00D4FF" cx="367" cy="63" r="3.5"/>
      <!-- Eye glow -->
      <circle fill="url(#eyeGlow)" cx="359" cy="63" r="7" opacity="0.4"/>
      <circle fill="url(#eyeGlow)" cx="367" cy="63" r="7" opacity="0.4"/>

      <!-- Antenna -->
      <line x1="363" y1="53" x2="363" y2="44" stroke="#1E3A58" stroke-width="2.5" stroke-linecap="round"/>
      <circle fill="#C9A84C" cx="363" cy="42" r="4"/>
      <!-- Antenna pulse -->
      <circle fill="#C9A84C" cx="363" cy="42" r="8" opacity="0">
        <animate attributeName="r" values="4;10;4" dur="2.5s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.5;0;0.5" dur="2.5s" repeatCount="indefinite"/>
      </circle>

      <!-- Robot right arm → fishing rod -->
      <line x1="376" y1="82" x2="392" y2="76" stroke="#1E3A58" stroke-width="5" stroke-linecap="round"/>
      <!-- Rod -->
      <line x1="392" y1="76" x2="430" y2="58" stroke="#8B5E3C" stroke-width="3" stroke-linecap="round"/>
      <!-- Rod tip -->
      <circle fill="#C9A84C" cx="430" cy="58" r="2.5"/>
      <!-- Fishing line -->
      <line x1="430" y1="60" x2="434" y2="138" stroke="rgba(255,255,255,0.4)" stroke-width="1" stroke-dasharray="3,3"/>
      <!-- Hook -->
      <path fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="1.5" stroke-linecap="round"
        d="M 434 138 Q 440 148 432 152"/>
      <!-- Fish (underwater, subtle) -->
      <g opacity="0.55">
        <ellipse fill="#1A4A7A" cx="450" cy="162" rx="14" ry="7"/>
        <path fill="#1A4A7A" d="M 464 162 L 474 155 L 474 169 Z"/>
        <circle fill="#7BE8FF" cx="444" cy="160" r="2"/>
      </g>
    </g>

    <!-- Moon -->
    <path fill="#E8DFC8" opacity="0.85"
      d="M 810 28 A 16 16 0 1 1 810 60 A 10 10 0 1 0 810 28 Z"/>

    <!-- Stars (static, a few in the SVG) -->
    <circle cx="100" cy="20" r="1.2" fill="white" opacity="0.7"/>
    <circle cx="180" cy="45" r="0.8" fill="white" opacity="0.5"/>
    <circle cx="520" cy="15" r="1.0" fill="white" opacity="0.6"/>
    <circle cx="640" cy="40" r="1.5" fill="white" opacity="0.8"/>
    <circle cx="730" cy="18" r="0.9" fill="white" opacity="0.5"/>
    <circle cx="860" cy="50" r="1.1" fill="white" opacity="0.6"/>
    <circle cx="60"  cy="55" r="0.7" fill="white" opacity="0.4"/>
    <circle cx="420" cy="35" r="1.0" fill="white" opacity="0.55"/>
  </svg>

</div>

<script>
  // ── Starfield ──────────────────────────────────────────────────
  const canvas = document.getElementById('stars');
  const ctx = canvas.getContext('2d');
  let stars = [];

  function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }

  function initStars() {
    stars = [];
    for (let i = 0; i < 160; i++) {
      stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height * 0.75,
        r: Math.random() * 1.4 + 0.3,
        o: Math.random() * 0.6 + 0.2,
        speed: Math.random() * 0.008 + 0.003,
        phase: Math.random() * Math.PI * 2
      });
    }
  }

  function drawStars(t) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    stars.forEach(s => {
      const opacity = s.o * (0.6 + 0.4 * Math.sin(t * s.speed + s.phase));
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,255,${opacity})`;
      ctx.fill();
    });
    requestAnimationFrame(drawStars);
  }

  resizeCanvas();
  initStars();
  requestAnimationFrame(drawStars);
  window.addEventListener('resize', () => { resizeCanvas(); initStars(); });

  // ── Chat ───────────────────────────────────────────────────────
  const messages = document.getElementById('messages');
  const input    = document.getElementById('user-input');
  const sendBtn  = document.getElementById('send-btn');
  let isWaiting = false, limitReached = false;

  function addMessage(text, role) {
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    div.textContent = text;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
  }

  function showTyping() {
    const d = document.createElement('div');
    d.className = 'typing'; d.id = 'typing-indicator';
    d.innerHTML = '<span></span><span></span><span></span>';
    messages.appendChild(d);
    messages.scrollTop = messages.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typing-indicator');
    if (t) t.remove();
  }

  async function sendMessage(text) {
    text = text || input.value.trim();
    if (!text || isWaiting || limitReached) return;
    input.value = ''; input.style.height = 'auto';
    addMessage(text, 'user');
    isWaiting = true; sendBtn.disabled = true;
    showTyping();

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text })
      });
      removeTyping();
      if (res.status === 429) {
        addMessage('שלחת הרבה מדי הודעות — אנא המתן כמה דקות.', 'system');
      } else {
        const data = await res.json();
        addMessage(data.reply, data.limit_reached ? 'system' : 'bot');
        if (data.limit_reached) {
          limitReached = true;
          input.disabled = true; sendBtn.disabled = true;
          input.placeholder = 'השיחה הסתיימה';
        }
      }
    } catch {
      removeTyping();
      addMessage('שגיאה — אנא נסה שוב או התקשר ל-{{ r.phone }}', 'system');
    }

    isWaiting = false;
    if (!limitReached) sendBtn.disabled = false;
  }

  sendBtn.addEventListener('click', () => sendMessage());

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 90) + 'px';
  });

  window.addEventListener('load', () => {
    addMessage({{ r.greeting | tojson }}, 'bot');
    const chipsDiv = document.createElement('div');
    chipsDiv.id = 'chips';
    {{ r.chips | tojson }}.forEach(text => {
      const btn = document.createElement('button');
      btn.className = 'chip'; btn.textContent = text;
      btn.addEventListener('click', () => { chipsDiv.remove(); sendMessage(text); });
      chipsDiv.appendChild(btn);
    });
    messages.appendChild(chipsDiv);
    messages.scrollTop = messages.scrollHeight;
    input.focus();
  });
</script>

</body>
</html>
