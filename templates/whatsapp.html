<!DOCTYPE html>
<html lang="he">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>{{ r.name }} — WhatsApp</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif;
    }

    /* Phone frame */
    .phone {
      width: 100%;
      max-width: 390px;
      height: 100vh;
      max-height: 844px;
      background: #0B141A;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border-radius: 44px;
      box-shadow: 0 0 0 10px #1a1a1a, 0 30px 80px rgba(0,0,0,0.8);
    }

    /* ── Header ── */
    .wa-header {
      background: #1F2C34;
      padding: 14px 16px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .wa-back {
      color: #00A884;
      font-size: 22px;
      cursor: pointer;
      flex-shrink: 0;
    }

    /* Swap image src to a real photo when available */
    .wa-avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: {{ r.color }};
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      color: white;
      flex-shrink: 0;
      overflow: hidden;
    }

    .wa-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
    }

    .wa-info { flex: 1; min-width: 0; }

    .wa-name {
      font-size: 16px;
      font-weight: 600;
      color: #E9EDEF;
    }

    .wa-status { font-size: 12px; color: #8696A0; margin-top: 1px; }
    .wa-status.typing { color: #00A884; }

    .wa-actions { display: flex; gap: 20px; flex-shrink: 0; }
    .wa-actions svg { width: 22px; height: 22px; fill: #8696A0; }

    /* ── Background ── */
    .wa-bg {
      flex: 1;
      overflow-y: auto;
      padding: 10px 10px 6px;
      display: flex;
      flex-direction: column;
      gap: 3px;
      scroll-behavior: smooth;
      background: #0B141A;
    }

    .wa-bg::-webkit-scrollbar { width: 3px; }
    .wa-bg::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

    /* Date divider */
    .date-divider {
      display: flex;
      justify-content: center;
      margin: 6px 0;
    }

    .date-divider span {
      background: #1F2C34;
      color: #8696A0;
      font-size: 11.5px;
      padding: 4px 12px;
      border-radius: 8px;
    }

    /* ── Message rows ── */
    .msg-row {
      display: flex;
      align-items: flex-end;
      gap: 6px;
    }

    .msg-row.bot  { justify-content: flex-start; }
    .msg-row.user { justify-content: flex-end; }

    /* Small avatar next to bot messages */
    .msg-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: {{ r.color }};
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      color: white;
      flex-shrink: 0;
      overflow: hidden;
      margin-bottom: 2px;
    }

    .msg-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
    }

    /* ── Bubbles ── */
    .bubble {
      max-width: 68%;
      padding: 8px 12px 20px;
      border-radius: 18px;
      font-size: 14.5px;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
      position: relative;
      animation: fadeIn 0.15s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.96); }
      to   { opacity: 1; transform: scale(1); }
    }

    /* Bot — received, LEFT, tail points toward avatar */
    .bubble.bot {
      background: #1F2C34;
      color: #E9EDEF;
      border-bottom-left-radius: 4px;
    }

    .bubble.bot::before {
      content: '';
      position: absolute;
      bottom: 6px;
      left: -7px;
      width: 0; height: 0;
      border-top: 6px solid transparent;
      border-right: 8px solid #1F2C34;
      border-bottom: 6px solid transparent;
    }

    /* User — sent, RIGHT, tail points right */
    .bubble.user {
      background: #005C4B;
      color: #E9EDEF;
      border-bottom-right-radius: 4px;
    }

    .bubble.user::before {
      content: '';
      position: absolute;
      bottom: 6px;
      right: -7px;
      width: 0; height: 0;
      border-top: 6px solid transparent;
      border-left: 8px solid #005C4B;
      border-bottom: 6px solid transparent;
    }

    /* Timestamp + ticks */
    .msg-meta {
      position: absolute;
      bottom: 5px;
      left: 10px;
      display: flex;
      align-items: center;
      gap: 3px;
      direction: ltr;
    }

    .msg-time { font-size: 10.5px; color: #8696A0; }
    .msg-ticks { font-size: 12px; color: #53BDEB; }

    /* Typing indicator */
    .typing-row { justify-content: flex-start; }

    .typing-bubble {
      background: #1F2C34;
      border-radius: 18px;
      border-bottom-left-radius: 4px;
      padding: 12px 16px;
      display: flex;
      gap: 4px;
      align-items: center;
      position: relative;
      animation: fadeIn 0.15s ease;
    }

    .typing-bubble::before {
      content: '';
      position: absolute;
      bottom: 6px;
      left: -7px;
      border-top: 6px solid transparent;
      border-right: 8px solid #1F2C34;
      border-bottom: 6px solid transparent;
    }

    .typing-bubble span {
      width: 7px; height: 7px;
      background: #8696A0;
      border-radius: 50%;
      animation: typingDot 1.4s infinite;
    }

    .typing-bubble span:nth-child(2) { animation-delay: 0.2s; }
    .typing-bubble span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typingDot {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
      30% { transform: translateY(-5px); opacity: 1; }
    }

    /* ── Input bar ── */
    .wa-input-bar {
      background: #1F2C34;
      padding: 10px 12px 14px;
      display: flex;
      align-items: flex-end;
      gap: 8px;
      flex-shrink: 0;
    }

    .wa-input-icon { color: #8696A0; font-size: 24px; padding-bottom: 6px; cursor: pointer; }

    #user-input {
      flex: 1;
      background: #2A3942;
      border: none;
      border-radius: 24px;
      padding: 10px 16px;
      font-size: 15px;
      color: #E9EDEF;
      outline: none;
      resize: none;
      max-height: 100px;
      line-height: 1.4;
      font-family: inherit;
      direction: rtl;
    }

    #user-input::placeholder { color: #8696A0; }

    #send-btn {
      width: 48px; height: 48px;
      border-radius: 50%;
      background: #00A884;
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s;
    }

    #send-btn:hover:not(:disabled) { background: #017A62; }
    #send-btn:disabled { background: #2A3942; cursor: default; }
    #send-btn svg { width: 22px; height: 22px; fill: white; }

    .icon-mic  { display: block; }
    .icon-send { display: none; }
    .has-text .icon-mic  { display: none; }
    .has-text .icon-send { display: block; }

    /* System */
    .sys-msg {
      display: flex;
      justify-content: center;
      margin: 4px 0;
    }

    .sys-msg span {
      background: #1F2C34;
      color: #8696A0;
      font-size: 12px;
      padding: 5px 14px;
      border-radius: 8px;
      text-align: center;
      max-width: 85%;
    }

    /* ── Owner notification banner ── */
    .owner-notif {
      position: absolute;
      top: 0; left: 0; right: 0;
      background: #1F2C34;
      border-bottom: 1px solid rgba(0,168,132,0.3);
      padding: 12px 16px;
      display: flex;
      gap: 12px;
      align-items: flex-start;
      z-index: 100;
      transform: translateY(-100%);
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      border-radius: 44px 44px 0 0;
    }

    .owner-notif.show { transform: translateY(0); }

    .notif-icon {
      width: 36px; height: 36px;
      background: #00A884;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .notif-body { flex: 1; min-width: 0; }

    .notif-title {
      font-size: 12px;
      color: #00A884;
      font-weight: 600;
      margin-bottom: 2px;
    }

    .notif-name {
      font-size: 13px;
      color: #E9EDEF;
      font-weight: 600;
    }

    .notif-details {
      font-size: 12px;
      color: #8696A0;
      margin-top: 4px;
      line-height: 1.6;
    }

    .notif-actions {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }

    .notif-btn {
      border: none;
      border-radius: 14px;
      padding: 4px 14px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
    }

    .notif-btn.confirm { background: #00A884; color: white; }
    .notif-btn.decline { background: #2A3942; color: #8696A0; }

    @media (max-width: 420px) {
      .phone { border-radius: 0; box-shadow: none; max-height: 100vh; }
      .owner-notif { border-radius: 0; }
    }
  </style>
</head>
<body>
<div class="phone">

  <!-- Owner notification (hidden until booking complete) -->
  <div class="owner-notif" id="owner-notif">
    <div class="notif-icon">🔔</div>
    <div class="notif-body">
      <div class="notif-title">ניסו הדייג — הזמנה חדשה</div>
      <div class="notif-name" id="notif-name"></div>
      <div class="notif-details" id="notif-details"></div>
      <div class="notif-actions">
        <button class="notif-btn confirm" onclick="dismissNotif()">✓ אישור</button>
        <button class="notif-btn decline" onclick="dismissNotif()">✗ דחייה</button>
      </div>
    </div>
  </div>

  <div class="wa-header">
    <div class="wa-back">&#8592;</div>
    <div class="wa-avatar">
      <img src="/static/niso.png" alt="{{ r.name }}">
    </div>
    <div class="wa-info">
      <div class="wa-name">{{ r.name }}</div>
      <div class="wa-status" id="wa-status">מחובר</div>
    </div>
    <div class="wa-actions">
      <svg viewBox="0 0 24 24"><path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/></svg>
      <svg viewBox="0 0 24 24"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg>
    </div>
  </div>

  <div class="wa-bg" id="messages">
    <div class="date-divider"><span>היום</span></div>
  </div>

  <div class="wa-input-bar">
    <div class="wa-input-icon">☺</div>
    <textarea id="user-input" placeholder="הקלד/י הודעה..." rows="1"></textarea>
    <button id="send-btn">
      <svg class="icon-mic" viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.93V21h2v-3.07c3.39-.5 6-3.4 6-6.93h-2z"/></svg>
      <svg class="icon-send" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>

</div>
<script>
  const messagesEl = document.getElementById('messages');
  const inputEl    = document.getElementById('user-input');
  const sendBtn    = document.getElementById('send-btn');
  const statusEl   = document.getElementById('wa-status');
  let isWaiting = false, limitReached = false;

  function parseBooking(text) {
    const match = text.match(/\[BOOKING_SENT:([^\]]+)\]/);
    if (!match) return null;
    const raw = match[1];
    const data = {};
    raw.split(',').forEach(pair => {
      const [k, ...v] = pair.split('=');
      data[k.trim()] = v.join('=').trim();
    });
    return data;
  }

  function showOwnerNotif(booking) {
    document.getElementById('notif-name').textContent = booking.name || '';
    document.getElementById('notif-details').innerHTML =
      `📅 ${booking.date || ''}　🕐 ${booking.time || ''}　👥 ${booking.guests || ''}<br>📞 ${booking.phone || ''}`;
    document.getElementById('owner-notif').classList.add('show');
  }

  function dismissNotif() {
    document.getElementById('owner-notif').classList.remove('show');
  }

  function now() {
    return new Date().toLocaleTimeString('he-IL', { hour: '2-digit', minute: '2-digit' });
  }

  function makeAvatar() {
    const av = document.createElement('div');
    av.className = 'msg-avatar';
    av.innerHTML = '<img src="/static/niso.png" alt="">';
    return av;
  }

  function addMessage(text, role) {
    const row = document.createElement('div');
    row.className = `msg-row ${role}`;

    if (role === 'bot') row.appendChild(makeAvatar());

    const bubble = document.createElement('div');
    bubble.className = `bubble ${role}`;
    bubble.setAttribute('dir', 'auto');
    bubble.textContent = text;

    const meta = document.createElement('div');
    meta.className = 'msg-meta';
    const time = document.createElement('span');
    time.className = 'msg-time';
    time.textContent = now();
    meta.appendChild(time);

    if (role === 'user') {
      const ticks = document.createElement('span');
      ticks.className = 'msg-ticks';
      ticks.textContent = '✓✓';
      meta.appendChild(ticks);
    }

    bubble.appendChild(meta);
    row.appendChild(bubble);
    messagesEl.appendChild(row);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function addSystemMsg(text) {
    const div = document.createElement('div');
    div.className = 'sys-msg';
    div.innerHTML = `<span>${text}</span>`;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function showTyping() {
    const row = document.createElement('div');
    row.className = 'msg-row typing-row';
    row.id = 'typing-row';
    row.appendChild(makeAvatar());
    row.innerHTML += `<div class="typing-bubble"><span></span><span></span><span></span></div>`;
    messagesEl.appendChild(row);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    statusEl.textContent = 'מקליד/ה...';
    statusEl.className = 'wa-status typing';
  }

  function removeTyping() {
    const t = document.getElementById('typing-row');
    if (t) t.remove();
    statusEl.textContent = 'מחובר';
    statusEl.className = 'wa-status';
  }

  async function sendMessage(text) {
    text = text || inputEl.value.trim();
    if (!text || isWaiting || limitReached) return;
    inputEl.value = '';
    inputEl.style.height = 'auto';
    sendBtn.classList.remove('has-text');
    addMessage(text, 'user');
    isWaiting = true;
    sendBtn.disabled = true;
    showTyping();

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text })
      });
      removeTyping();
      if (res.status === 429) {
        addSystemMsg('שלחת יותר מדי הודעות — המתן כמה דקות');
      } else {
        const data = await res.json();
        const booking = parseBooking(data.reply);
        const cleanReply = data.reply.replace(/\[BOOKING_SENT:[^\]]+\]/, '').trim();
        addMessage(cleanReply, 'bot');
        if (booking) setTimeout(() => showOwnerNotif(booking), 600);
        if (data.limit_reached) {
          limitReached = true;
          inputEl.disabled = true;
          sendBtn.disabled = true;
          inputEl.placeholder = 'השיחה הסתיימה';
        }
      }
    } catch {
      removeTyping();
      addSystemMsg('שגיאה בחיבור — נסה שוב');
    }

    isWaiting = false;
    if (!limitReached) sendBtn.disabled = false;
  }

  sendBtn.addEventListener('click', () => sendMessage());

  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 100) + 'px';
    sendBtn.classList.toggle('has-text', !!inputEl.value.trim());
  });

  window.addEventListener('load', () => {
    setTimeout(() => addMessage({{ r.greeting | tojson }}, 'bot'), 600);
    inputEl.focus();
  });
</script>
</body>
</html>
